<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagrama Bioclimático de Givoni</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
       .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
       .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #ecf0f1;
            border-radius: 8px;
        }
       .control-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }
        input {
            padding: 8px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            width: 120px;
        }
        button {
            padding: 10px 20px;
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            align-self: flex-end;
        }
        button:hover {
            background-color: #3498db;
        }
        #givoniChart {
            width: 100%;
            height: 600px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Calculadora y Diagrama de Givoni</h1>
    
    <div class="controls">
        <div class="control-group">
            <label for="temp">Temperatura (°C):</label>
            <input type="number" id="temp" value="28" step="0.1">
        </div>
        <div class="control-group">
            <label for="rh">Humedad Relativa (%):</label>
            <input type="number" id="rh" value="60" step="1" min="0" max="100">
        </div>
        <button onclick="plotPoint()">Analizar Punto</button>
    </div>

    <div id="givoniChart"></div>
</div>

<script>
    // Fórmula termodinámica para calcular la Humedad Absoluta (g/kg)
    function calcularHumedadAbsoluta(t, rh) {
        const rh_frac = rh / 100.0;
        // Presión de vapor de agua (Pa)
        const pwv = 610.48 * rh_frac * Math.pow(10, (7.5 * t) / (235 + t));
        const p = 101325; // Presión atmosférica estándar a nivel del mar (Pa)
        // Humedad Absoluta en g/kg de aire seco
        return 0.6221 * (pwv / (p - pwv)) * 1000;
    }

    // Curva de saturación (100% HR)
    let sat_x =;
    let sat_y =;
    for(let t = 0; t <= 50; t += 0.5) {
        sat_x.push(t);
        sat_y.push(calcularHumedadAbsoluta(t, 100));
    }

    const curve100 = {
        x: sat_x,
        y: sat_y,
        mode: 'lines',
        name: 'Curva de Saturación (100% HR)',
        line: { color: 'blue', width: 2 }
    };

    // Polígonos de zonas bioclimáticas (Coordenadas aproximadas estándar)
    const zonas = [
        {
            x: [20, 20, 26, 27, 27, 20],
            y: [4, 12, 14, 14, 4, 4],
            fill: 'toself',
            fillcolor: 'rgba(46, 204, 113, 0.5)',
            line: { color: '#27ae60' },
            name: '1. Zona de Confort'
        },
        {
            x: [26, 27, 32, 32, 26],
            y: [4, 14, 14, 4, 4],
            fill: 'toself',
            fillcolor: 'rgba(52, 152, 219, 0.3)',
            line: { color: '#2980b9' },
            name: '2. Ventilación Natural'
        },
        {
            x: [26, 26, 36, 36, 26],
            y: [4, 10, 10, 4, 4],
            fill: 'toself',
            fillcolor: 'rgba(241, 196, 15, 0.4)',
            line: { color: '#f39c12' },
            name: '3. Alta Masa Térmica'
        },
        {
            x: [26, 27, 35, 44, 36, 26],
            y: [10, 14, 14, 4, 4, 10],
            fill: 'toself',
            fillcolor: 'rgba(155, 89, 182, 0.3)',
            line: { color: '#8e44ad' },
            name: '4. Enfriamiento Evaporativo'
        },
        {
            x: [10, 10, 20, 20, 10],
            y: [2, 10, 12, 4, 2],
            fill: 'toself',
            fillcolor: 'rgba(231, 76, 60, 0.3)',
            line: { color: '#c0392b' },
            name: '5. Calefacción Solar Pasiva'
        }
    ];

    let layout = {
        title: 'Carta Bioclimática de Givoni (A nivel del mar)',
        xaxis: { 
            title: 'Temperatura de Bulbo Seco (°C)', 
            range: ,
            dtick: 5
        },
        yaxis: { 
            title: 'Humedad Absoluta (g vapor/kg aire seco)', 
            range: ,
            dtick: 2
        },
        showlegend: true,
        hovermode: 'closest'
    };

    // Renderizar gráfico inicial
    Plotly.newPlot('givoniChart', [curve100,...zonas], layout);

    // Función para analizar y graficar el punto ingresado
    function plotPoint() {
        const t = parseFloat(document.getElementById('temp').value);
        const rh = parseFloat(document.getElementById('rh').value);
        const ah = calcularHumedadAbsoluta(t, rh);

        const userPoint = {
            x: [t],
            y: [ah],
            mode: 'markers+text',
            name: 'Punto Evaluado',
            text: [`(${t}°C, ${rh}%)`],
            textposition: 'top right',
            marker: { size: 10, color: 'red', symbol: 'circle-dot' }
        };

        // Mantener las zonas base y reemplazar el punto anterior si lo hubiera
        Plotly.react('givoniChart', [curve100,...zonas, userPoint], layout);
    }
</script>

</body>
</html>
